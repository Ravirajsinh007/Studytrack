<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EduTrack</title>
  <base href="/">
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
  <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular-route.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0e1a; --bg2: #111827; --bg3: #1a2235;
      --card: #141c2e; --card2: #1e2a40;
      --border: rgba(255,255,255,0.07); --border2: rgba(255,255,255,0.13);
      --text: #f0f4ff; --text2: #8896b3; --text3: #5a6b8a;
      --accent: #4f7cff; --accent2: #7c5cff;
      --teal: #22d4b0; --amber: #f5a623; --red: #ff5b6b; --green: #34d98e;
      --radius: 14px; --radius-sm: 8px;
    }
    body { font-family: 'Sora', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 99px; }
    /* LOGIN */
    .login-page { min-height: 100vh; display: grid; grid-template-columns: 1fr 1fr; }
    .login-left { background: linear-gradient(135deg,#0f1829 0%,#1a2545 50%,#0f1829 100%); display: flex; flex-direction: column; justify-content: center; padding: 60px; position: relative; overflow: hidden; }
    .login-left::before { content:''; position:absolute; width:500px; height:500px; border-radius:50%; background:radial-gradient(circle,rgba(79,124,255,.12) 0%,transparent 70%); top:-100px; left:-100px; }
    .login-left::after  { content:''; position:absolute; width:400px; height:400px; border-radius:50%; background:radial-gradient(circle,rgba(124,92,255,.1) 0%,transparent 70%); bottom:-80px; right:-80px; }
    .brand { display:flex; align-items:center; gap:12px; margin-bottom:64px; position:relative; z-index:1; }
    .brand-icon { width:44px; height:44px; background:linear-gradient(135deg,var(--accent),var(--accent2)); border-radius:12px; display:flex; align-items:center; justify-content:center; font-size:20px; }
    .brand-name { font-size:22px; font-weight:700; letter-spacing:-.5px; background:linear-gradient(135deg,#fff,#a0b4ff); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
    .login-headline { font-size:42px; font-weight:700; line-height:1.15; letter-spacing:-1.5px; margin-bottom:20px; position:relative; z-index:1; }
    .login-headline span { background:linear-gradient(135deg,var(--accent),var(--teal)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
    .login-sub { font-size:15px; color:var(--text2); line-height:1.7; max-width:380px; position:relative; z-index:1; margin-bottom:48px; }
    .stats-row { display:flex; gap:32px; position:relative; z-index:1; }
    .stat-num { font-size:26px; font-weight:700; letter-spacing:-1px; }
    .stat-label { font-size:12px; color:var(--text3); text-transform:uppercase; letter-spacing:1px; margin-top:2px; }
    .login-right { display:flex; align-items:center; justify-content:center; padding:60px; background:var(--bg); }
    .login-form-wrap { width:100%; max-width:400px; }
    .login-form-wrap h2 { font-size:26px; font-weight:700; letter-spacing:-.5px; margin-bottom:6px; }
    .login-form-wrap p { color:var(--text2); font-size:14px; margin-bottom:36px; }
    .field-group { margin-bottom:20px; }
    .field-group label { display:block; font-size:12px; font-weight:600; letter-spacing:.8px; text-transform:uppercase; color:var(--text2); margin-bottom:8px; }
    .field-group input { width:100%; background:var(--card); border:1.5px solid var(--border2); border-radius:var(--radius-sm); color:var(--text); font-family:'Sora',sans-serif; font-size:14px; padding:13px 16px; transition:border-color .2s,box-shadow .2s; outline:none; }
    .field-group input:focus { border-color:var(--accent); box-shadow:0 0 0 3px rgba(79,124,255,.15); }
    .field-group input::placeholder { color:var(--text3); }
    .role-selector { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:28px; }
    .role-btn { background:var(--card); border:1.5px solid var(--border2); border-radius:var(--radius-sm); color:var(--text2); cursor:pointer; font-family:'Sora',sans-serif; font-size:13px; font-weight:500; padding:11px 16px; text-align:center; transition:all .2s; }
    .role-btn.active { background:rgba(79,124,255,.12); border-color:var(--accent); color:var(--accent); }
    .btn-login { width:100%; background:linear-gradient(135deg,var(--accent),var(--accent2)); border:none; border-radius:var(--radius-sm); color:#fff; cursor:pointer; font-family:'Sora',sans-serif; font-size:14px; font-weight:600; padding:14px; transition:opacity .2s,transform .15s; }
    .btn-login:hover { opacity:.9; transform:translateY(-1px); }
    .error-msg { background:rgba(255,91,107,.1); border:1px solid rgba(255,91,107,.25); border-radius:var(--radius-sm); color:var(--red); font-size:13px; padding:11px 14px; margin-bottom:20px; }
    /* APP SHELL */
    .app-shell { display:grid; grid-template-columns:240px 1fr; min-height:100vh; }
    .sidebar { background:var(--card); border-right:1px solid var(--border); display:flex; flex-direction:column; padding:28px 0; position:sticky; top:0; height:100vh; }
    .sidebar-brand { display:flex; align-items:center; gap:10px; padding:0 24px 32px; border-bottom:1px solid var(--border); }
    .sidebar-brand .brand-icon { width:36px; height:36px; font-size:16px; border-radius:10px; }
    .sidebar-brand .brand-name { font-size:18px; }
    .sidebar-section { padding:20px 12px 8px; }
    .sidebar-section-label { font-size:10px; font-weight:600; letter-spacing:1.2px; text-transform:uppercase; color:var(--text3); padding:0 12px; margin-bottom:6px; }
    .nav-item { display:flex; align-items:center; gap:10px; border-radius:var(--radius-sm); color:var(--text2); cursor:pointer; font-size:13.5px; font-weight:500; padding:10px 12px; text-decoration:none; transition:all .15s; }
    .nav-item:hover { background:var(--card2); color:var(--text); }
    .nav-item.active { background:rgba(79,124,255,.12); color:var(--accent); }
    .nav-icon { width:18px; height:18px; opacity:.7; flex-shrink:0; }
    .nav-item.active .nav-icon { opacity:1; }
    .nav-badge { margin-left:auto; background:var(--accent); color:#fff; font-size:10px; font-weight:700; padding:2px 7px; border-radius:99px; }
    .nav-badge.red { background:var(--red); }
    .nav-badge.amber { background:var(--amber); }
    .sidebar-footer { margin-top:auto; padding:20px 12px 0; border-top:1px solid var(--border); }
    .user-chip { display:flex; align-items:center; gap:10px; padding:10px 12px; border-radius:var(--radius-sm); }
    .user-avatar { width:34px; height:34px; border-radius:50%; background:linear-gradient(135deg,var(--accent),var(--accent2)); display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:700; flex-shrink:0; }
    .user-name { font-size:13px; font-weight:600; }
    .user-role { font-size:11px; color:var(--text3); margin-top:1px; }
    /* MAIN */
    .main-content { background:var(--bg); overflow-y:auto; }
    .topbar { background:var(--bg); border-bottom:1px solid var(--border); padding:18px 36px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:10; }
    .topbar-title { font-size:16px; font-weight:600; }
    .topbar-sub { font-size:12px; color:var(--text3); margin-top:2px; }
    .topbar-actions { display:flex; align-items:center; gap:10px; }
    .btn-icon { width:36px; height:36px; background:var(--card); border:1px solid var(--border2); border-radius:var(--radius-sm); cursor:pointer; display:flex; align-items:center; justify-content:center; color:var(--text2); transition:all .15s; }
    .btn-icon:hover { background:var(--card2); color:var(--text); }
    .page-body { padding:32px 36px; }
    .page-body > * { animation:fadeUp .3s ease both; }
    .page-body > *:nth-child(1){animation-delay:.00s}
    .page-body > *:nth-child(2){animation-delay:.05s}
    .page-body > *:nth-child(3){animation-delay:.10s}
    .page-body > *:nth-child(4){animation-delay:.15s}
    .page-body > *:nth-child(5){animation-delay:.20s}
    @keyframes fadeUp { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:translateY(0)} }
    /* METRICS */
    .metrics-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:16px; margin-bottom:28px; }
    .metric-card { background:var(--card); border:1px solid var(--border); border-radius:var(--radius); padding:20px 22px; position:relative; overflow:hidden; transition:border-color .2s; }
    .metric-card:hover { border-color:var(--border2); }
    .metric-label { font-size:11px; font-weight:600; letter-spacing:.8px; text-transform:uppercase; color:var(--text3); margin-bottom:10px; }
    .metric-val { font-size:30px; font-weight:700; letter-spacing:-1px; line-height:1; margin-bottom:8px; }
    .metric-val.blue{color:var(--accent)} .metric-val.teal{color:var(--teal)} .metric-val.amber{color:var(--amber)} .metric-val.green{color:var(--green)} .metric-val.red{color:var(--red)}
    .metric-change { font-size:12px; color:var(--green); }
    /* PANELS */
    .two-col { display:grid; grid-template-columns:1fr 340px; gap:20px; margin-bottom:28px; }
    .three-col { display:grid; grid-template-columns:1fr 1fr 1fr; gap:20px; margin-bottom:28px; }
    .panel { background:var(--card); border:1px solid var(--border); border-radius:var(--radius); margin-bottom:20px; }
    .panel-head { display:flex; align-items:center; justify-content:space-between; padding:18px 22px; border-bottom:1px solid var(--border); }
    .panel-title { font-size:13px; font-weight:600; }
    .panel-link { font-size:12px; color:var(--accent); cursor:pointer; background:none; border:none; font-family:'Sora',sans-serif; }
    .panel-body { padding:6px 0; }
    /* COURSES */
    .course-item { display:flex; align-items:center; gap:14px; padding:13px 22px; cursor:pointer; transition:background .15s; }
    .course-item:hover { background:var(--card2); }
    .course-dot { width:38px; height:38px; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:16px; flex-shrink:0; }
    .course-dot.blue{background:rgba(79,124,255,.15)} .course-dot.teal{background:rgba(34,212,176,.15)} .course-dot.amber{background:rgba(245,166,35,.15)} .course-dot.purple{background:rgba(124,92,255,.15)} .course-dot.red{background:rgba(255,91,107,.15)} .course-dot.green{background:rgba(52,217,142,.15)}
    .course-name { font-size:13.5px; font-weight:500; margin-bottom:3px; }
    .course-meta { font-size:11.5px; color:var(--text3); }
    .course-progress-wrap { margin-left:auto; text-align:right; }
    .course-pct { font-size:12px; font-weight:600; color:var(--text2); margin-bottom:5px; }
    .progress-bar { width:80px; height:4px; background:var(--card2); border-radius:99px; overflow:hidden; }
    .progress-fill { height:100%; border-radius:99px; }
    .progress-fill.blue{background:var(--accent)} .progress-fill.teal{background:var(--teal)} .progress-fill.amber{background:var(--amber)} .progress-fill.green{background:var(--green)} .progress-fill.red{background:var(--red)} .progress-fill.purple{background:var(--accent2)}
    /* DEADLINES */
    .deadline-item { padding:13px 22px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:12px; }
    .deadline-item:last-child { border-bottom:none; }
    .deadline-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
    .deadline-dot.red{background:var(--red);box-shadow:0 0 6px rgba(255,91,107,.5)}
    .deadline-dot.amber{background:var(--amber);box-shadow:0 0 6px rgba(245,166,35,.5)}
    .deadline-dot.blue{background:var(--accent)}
    .deadline-name { font-size:13px; font-weight:500; margin-bottom:3px; }
    .deadline-course { font-size:11.5px; color:var(--text3); }
    .deadline-time { margin-left:auto; font-size:11px; font-family:'DM Mono',monospace; white-space:nowrap; }
    .deadline-time.red{color:var(--red)} .deadline-time.amber{color:var(--amber)} .deadline-time.blue{color:var(--text2)}
    /* TABLES */
    .data-table { width:100%; border-collapse:collapse; }
    .data-table th { font-size:10px; font-weight:600; letter-spacing:.8px; text-transform:uppercase; color:var(--text3); padding:10px 22px; text-align:left; border-bottom:1px solid var(--border); }
    .data-table td { font-size:13px; padding:13px 22px; border-bottom:1px solid var(--border); color:var(--text); }
    .data-table tr:last-child td { border-bottom:none; }
    .data-table tr:hover td { background:var(--card2); cursor:pointer; }
    .status-pill { display:inline-flex; align-items:center; font-size:11px; font-weight:600; padding:3px 10px; border-radius:99px; letter-spacing:.3px; }
    .status-pill.graded{background:rgba(52,217,142,.12);color:var(--green)}
    .status-pill.submitted{background:rgba(79,124,255,.12);color:var(--accent)}
    .status-pill.review{background:rgba(245,166,35,.12);color:var(--amber)}
    .status-pill.resubmit{background:rgba(255,91,107,.12);color:var(--red)}
    .status-pill.active{background:rgba(52,217,142,.12);color:var(--green)}
    .status-pill.pending{background:rgba(245,166,35,.12);color:var(--amber)}
    /* GRADE ROWS */
    .grade-row { display:flex; align-items:center; gap:14px; padding:13px 22px; border-bottom:1px solid var(--border); transition:background .15s; cursor:pointer; }
    .grade-row:hover { background:var(--card2); }
    .grade-row:last-child { border-bottom:none; }
    .grade-avatar { width:34px; height:34px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:700; flex-shrink:0; }
    .grade-avatar.a{background:rgba(79,124,255,.2);color:var(--accent)}
    .grade-avatar.b{background:rgba(34,212,176,.2);color:var(--teal)}
    .grade-avatar.c{background:rgba(245,166,35,.2);color:var(--amber)}
    .grade-avatar.d{background:rgba(124,92,255,.2);color:var(--accent2)}
    .grade-avatar.e{background:rgba(255,91,107,.2);color:var(--red)}
    .grade-student { font-size:13px; font-weight:500; }
    .grade-assign { font-size:11.5px; color:var(--text3); margin-top:2px; }
    /* ANNOUNCEMENTS */
    .ann-item { padding:16px 22px; border-bottom:1px solid var(--border); }
    .ann-item:last-child { border-bottom:none; }
    .ann-course-tag { display:inline-flex; font-size:10px; font-weight:600; letter-spacing:.5px; padding:3px 8px; border-radius:4px; margin-bottom:7px; }
    .ann-title { font-size:13.5px; font-weight:500; margin-bottom:4px; }
    .ann-msg { font-size:12.5px; color:var(--text2); line-height:1.6; margin-bottom:6px; }
    .ann-time { font-size:11px; color:var(--text3); }
    /* FORMS */
    .form-group { margin-bottom:20px; }
    .form-group label { display:block; font-size:12px; font-weight:600; letter-spacing:.8px; text-transform:uppercase; color:var(--text2); margin-bottom:8px; }
    .form-group input, .form-group textarea, .form-group select {
      width:100%; background:var(--bg3); border:1.5px solid var(--border2); border-radius:var(--radius-sm);
      color:var(--text); font-family:'Sora',sans-serif; font-size:14px; padding:12px 16px;
      transition:border-color .2s,box-shadow .2s; outline:none;
    }
    .form-group input:focus,.form-group textarea:focus,.form-group select:focus { border-color:var(--accent); box-shadow:0 0 0 3px rgba(79,124,255,.15); }
    .form-group textarea { resize:vertical; min-height:100px; }
    .form-group select option { background:var(--bg2); }
    .form-group input::placeholder,.form-group textarea::placeholder { color:var(--text3); }
    .upload-zone { background:var(--bg3); border:2px dashed var(--border2); border-radius:var(--radius); padding:40px; text-align:center; cursor:pointer; transition:border-color .2s; }
    .upload-zone:hover,.upload-zone.dragover { border-color:var(--accent); background:rgba(79,124,255,.04); }
    .upload-icon { font-size:36px; margin-bottom:12px; }
    .upload-title { font-size:14px; font-weight:600; margin-bottom:6px; }
    .upload-sub { font-size:12px; color:var(--text3); }
    .btn-primary { background:linear-gradient(135deg,var(--accent),var(--accent2)); border:none; border-radius:var(--radius-sm); color:#fff; cursor:pointer; font-family:'Sora',sans-serif; font-size:13px; font-weight:600; padding:11px 20px; transition:opacity .2s,transform .15s; display:inline-flex; align-items:center; gap:8px; }
    .btn-primary:hover { opacity:.9; transform:translateY(-1px); }
    .btn-secondary { background:var(--card2); border:1px solid var(--border2); border-radius:var(--radius-sm); color:var(--text2); cursor:pointer; font-family:'Sora',sans-serif; font-size:13px; font-weight:500; padding:11px 20px; transition:all .15s; }
    .btn-secondary:hover { border-color:var(--accent); color:var(--accent); }
    .btn-danger { background:rgba(255,91,107,.1); border:1px solid rgba(255,91,107,.25); border-radius:var(--radius-sm); color:var(--red); cursor:pointer; font-family:'Sora',sans-serif; font-size:13px; font-weight:600; padding:11px 20px; }
    .btn-success { background:rgba(52,217,142,.1); border:1px solid rgba(52,217,142,.25); border-radius:var(--radius-sm); color:var(--green); cursor:pointer; font-family:'Sora',sans-serif; font-size:13px; font-weight:600; padding:11px 20px; }
    .actions-row { display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
    .success-msg { background:rgba(52,217,142,.1); border:1px solid rgba(52,217,142,.25); border-radius:var(--radius-sm); color:var(--green); font-size:13px; padding:11px 14px; margin-bottom:20px; }
    .error-banner { background:rgba(255,91,107,.1); border:1px solid rgba(255,91,107,.25); border-radius:var(--radius-sm); color:var(--red); font-size:13px; padding:11px 14px; margin-bottom:20px; }
    /* MODAL */
    .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,.7); z-index:100; display:flex; align-items:center; justify-content:center; }
    .modal-box { background:var(--card); border:1px solid var(--border2); border-radius:var(--radius); padding:32px; width:100%; max-width:520px; max-height:90vh; overflow-y:auto; }
    .modal-head { display:flex; align-items:center; justify-content:space-between; margin-bottom:24px; }
    .modal-title { font-size:16px; font-weight:600; }
    .modal-close { background:none; border:none; color:var(--text3); font-size:20px; cursor:pointer; }
    /* MODULE CARD */
    .module-card { background:var(--bg3); border:1px solid var(--border); border-radius:var(--radius-sm); padding:16px 20px; margin-bottom:10px; display:flex; align-items:flex-start; gap:14px; transition:border-color .2s; }
    .module-card:hover { border-color:var(--border2); }
    .module-num { width:28px; height:28px; border-radius:50%; background:rgba(79,124,255,.15); color:var(--accent); display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:700; flex-shrink:0; margin-top:2px; }
    .module-title { font-size:13.5px; font-weight:500; margin-bottom:4px; }
    .module-meta { font-size:12px; color:var(--text3); line-height:1.5; }
    .module-link { font-size:12px; color:var(--accent); margin-top:4px; text-decoration:none; }
    /* ANALYTICS BAR */
    .analytics-bar-wrap { display:flex; align-items:center; gap:14px; padding:12px 22px; border-bottom:1px solid var(--border); }
    .analytics-bar-wrap:last-child { border-bottom:none; }
    .analytics-label { font-size:13px; min-width:140px; }
    .analytics-bar-bg { flex:1; height:6px; background:var(--card2); border-radius:99px; overflow:hidden; }
    .analytics-bar-fill { height:100%; border-radius:99px; background:linear-gradient(90deg,var(--accent),var(--teal)); }
    .analytics-val { font-size:12px; font-family:'DM Mono',monospace; color:var(--text2); min-width:40px; text-align:right; }
    /* GRADE INPUT */
    .grade-input-row { background:var(--bg3); border-radius:var(--radius-sm); padding:16px 20px; margin-bottom:10px; }
    .grade-input-row .student-info { display:flex; align-items:center; gap:12px; margin-bottom:14px; }
    .grade-fields { display:grid; grid-template-columns:1fr 2fr; gap:12px; }
    .mini-input { background:var(--card2); border:1px solid var(--border2); border-radius:6px; color:var(--text); font-family:'Sora',sans-serif; font-size:13px; padding:9px 12px; width:100%; outline:none; }
    .mini-input:focus { border-color:var(--accent); }
    /* TABS */
    .tabs { display:flex; gap:4px; padding:16px 22px; border-bottom:1px solid var(--border); }
    .tab-btn { background:none; border:none; border-radius:var(--radius-sm); color:var(--text2); cursor:pointer; font-family:'Sora',sans-serif; font-size:13px; font-weight:500; padding:8px 16px; transition:all .15s; }
    .tab-btn:hover { background:var(--card2); color:var(--text); }
    .tab-btn.active { background:rgba(79,124,255,.12); color:var(--accent); }
    /* EMPTY STATE */
    .empty-state { padding:48px 22px; text-align:center; }
    .empty-icon { font-size:40px; margin-bottom:14px; }
    .empty-title { font-size:14px; font-weight:600; margin-bottom:6px; }
    .empty-sub { font-size:13px; color:var(--text3); }
    /* FORUM */
    .thread-item { padding:16px 22px; border-bottom:1px solid var(--border); cursor:pointer; transition:background .15s; }
    .thread-item:hover { background:var(--card2); }
    .thread-head { display:flex; align-items:flex-start; gap:12px; margin-bottom:6px; }
