<div class="app-shell">
  <div class="sidebar">
    <div class="sidebar-brand"><div class="brand-icon">📚</div><div class="brand-name">EduTrack</div></div>
    <div class="sidebar-section">
      <div class="sidebar-section-label">Instructor</div>
      <a class="nav-item" href="#!/instructor/dashboard"><svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>Overview</a>
      <a class="nav-item" href="#!/instructor/courses"><svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>Manage Courses</a>
      <a class="nav-item" href="#!/instructor/grading"><svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 11 12 14 22 4"/></svg>Grade Submissions</a>
      <a class="nav-item active" href="#!/instructor/announcements"><svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/></svg>Announcements</a>
      <a class="nav-item" href="#!/instructor/analytics"><svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>Analytics</a>
    </div>
    <div class="sidebar-footer">
      <div class="user-chip"><div class="user-avatar">{{username[0]}}</div><div><div class="user-name">{{username}}</div><div class="user-role">Instructor</div></div></div>
      <a class="nav-item" ng-click="logout()"><svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>Logout</a>
    </div>
  </div>
  <div class="main-content">
    <div class="topbar"><div><div class="topbar-title">Announcements</div><div class="topbar-sub">Post updates to your course students</div></div><div class="topbar-actions"><button class="btn-primary" ng-click="showForm=!showForm">+ Post Announcement</button></div></div>
    <div class="page-body">
      <div class="panel" ng-if="showForm" style="margin-bottom:20px">
        <div class="panel-head"><div class="panel-title">New Announcement</div></div>
        <div style="padding:22px">
          <div class="success-msg" ng-if="postSuccess">✅ Announcement posted!</div>
          <div class="form-group"><label>Course</label><select ng-model="newAnn.course"><option ng-repeat="c in courses" value="{{c.title}}">{{c.title}}</option></select></div>
          <div class="form-group"><label>Title</label><input ng-model="newAnn.title" placeholder="Announcement headline..." /></div>
          <div class="form-group"><label>Message</label><textarea ng-model="newAnn.message" placeholder="Full announcement text..." style="min-height:120px"></textarea></div>
          <div class="actions-row"><button class="btn-primary" ng-click="postAnnouncement()">Post →</button><button class="btn-secondary" ng-click="showForm=false">Cancel</button></div>
        </div>
      </div>
      <div class="panel">
        <div class="panel-head"><div class="panel-title">Posted Announcements</div></div>
        <div class="ann-item" ng-repeat="a in announcements">
          <div style="display:flex;align-items:flex-start;justify-content:space-between">
            <div>
              <div class="ann-course-tag" style="background:rgba(79,124,255,.12);color:var(--accent)">{{a.course}}</div>
              <div class="ann-title">{{a.title}}</div>
              <div class="ann-msg">{{a.message}}</div>
              <div class="ann-time">{{a.time}}</div>
            </div>
            <button class="btn-danger" style="padding:5px 10px;font-size:11px;flex-shrink:0" ng-click="deleteAnn(a)">Delete</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
